    <path d="M19 38L22.5 41.5L29 35" stroke="#E97724" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- SIGPLAN text -->
  <text x="60" y="24" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="800" fill="#E97724" letter-spacing="2">SIGPLAN</text>
  <!-- Subtle underline accent -->
  <rect x="60" y="30" width="132" height="2" rx="1" fill="#E97724" opacity="0.3"/>
  <!-- Subtitle -->
  <text x="60" y="46" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="9" fill="#9CA3AF" letter-spacing="0.5">GOVERNAN&#199;A E PLANEJAMENTO</text>
</svg>
