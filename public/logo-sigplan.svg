          fill="#E97724" opacity="0.15" stroke="#E97724" stroke-width="2" stroke-linejoin="round"/>
    <!-- Inner gear/planning symbol -->
    <circle cx="24" cy="22" r="8" stroke="#E97724" stroke-width="2" fill="none"/>
    <line x1="24" y1="12" x2="24" y2="16" stroke="#E97724" stroke-width="2" stroke-linecap="round"/>
    <line x1="24" y1="28" x2="24" y2="32" stroke="#E97724" stroke-width="2" stroke-linecap="round"/>
    <line x1="14" y1="22" x2="18" y2="22" stroke="#E97724" stroke-width="2" stroke-linecap="round"/>
    <line x1="30" y1="22" x2="34" y2="22" stroke="#E97724" stroke-width="2" stroke-linecap="round"/>
    <!-- Diagonal gear teeth -->
    <line x1="17" y1="15" x2="19.8" y2="17.8" stroke="#E97724" stroke-width="2" stroke-linecap="round"/>
    <line x1="28.2" y1="26.2" x2="31" y2="29" stroke="#E97724" stroke-width="2" stroke-linecap="round"/>
    <line x1="31" y1="15" x2="28.2" y2="17.8" stroke="#E97724" stroke-width="2" stroke-linecap="round"/>
    <line x1="19.8" y1="26.2" x2="17" y2="29" stroke="#E97724" stroke-width="2" stroke-linecap="round"/>
    <!-- Center dot -->
    <circle cx="24" cy="22" r="2.5" fill="#E97724"/>
